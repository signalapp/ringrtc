# Disable WirePlumber hardware device monitoring in the call-sim container.
#
# This prevents WirePlumber from taking time to enumerate and access devices
# provided by the host, which can cause delays in audio measurements.
wireplumber.profiles = {
  main = {
    hardware.audio = disabled
    hardware.bluetooth = disabled
    hardware.video-capture = disabled
  }
}
