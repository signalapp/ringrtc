name: 'Auto Assign'
on:
  pull_request_target:
    types: [opened, ready_for_review]
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  add-reviews:
    if: ${{ github.event.pull_request.assignees[0] == null }}
    runs-on: ubuntu-latest
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.2
        with:
          configuration-path: '.github/config/auto-assign.yml'
